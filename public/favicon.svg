<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1B4332"/>
  <!-- Two overlapping leaves like the 🌿 emoji style -->
  <!-- Left leaf -->
  <path d="M16 24 C16 24 7 20 7 12 C7 12 12 10 16 14 Z" fill="#52B788"/>
  <!-- Right leaf -->
  <path d="M16 24 C16 24 25 20 25 12 C25 12 20 10 16 14 Z" fill="#74C69D"/>
  <!-- Center stem -->
  <line x1="16" y1="24" x2="16" y2="14" stroke="#2D6A4F" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left leaf vein -->
  <path d="M16 19 C13 17 10 15 8.5 13" stroke="#2D6A4F" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <!-- Right leaf vein -->
  <path d="M16 19 C19 17 22 15 23.5 13" stroke="#40916C" stroke-width="0.7" stroke-linecap="round" fill="none"/>
</svg>
